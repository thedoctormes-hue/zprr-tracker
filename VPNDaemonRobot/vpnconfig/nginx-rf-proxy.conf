# Nginx config for RF Proxy with PROXY protocol
# Listens on port 443, forwards to Xray with PROXY protocol

stream {
    # HTTPS frontend - looks like normal HTTPS
    upstream xray_upstream {
        server 127.0.0.1:47474;
    }

    server {
        listen 443;
        proxy_pass xray_upstream;
        proxy_protocol on;
        proxy_timeout 10s;
        proxy_responses 1;
        
        # SSL termination for masking
        ssl_certificate /etc/nginx/ssl/ok.ru.crt;
        ssl_certificate_key /etc/nginx/ssl/ok.ru.key;
        ssl_protocols TLSv1.3 TLSv1.2;
    }

    # Fallback HTTP for non-SSL traffic
    server {
        listen 80;
        proxy_pass xray_upstream;
        proxy_protocol off;
    }
}

http {
    # Health check endpoint
    server {
        listen 8080;
        
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
        
        location /nginx_status {
            stub_status on;
            allow 127.0.0.1;
            deny all;
        }
    }
}