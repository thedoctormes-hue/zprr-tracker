<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="400" fill="url(#grad1)" />
  
  <!-- Grid pattern -->
  <g opacity="0.1">
    <line x1="0" y1="80" x2="1200" y2="80" stroke="#00d4ff" stroke-width="1"/>
    <line x1="0" y1="160" x2="1200" y2="160" stroke="#00d4ff" stroke-width="1"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="#00d4ff" stroke-width="1"/>
    <line x1="0" y1="320" x2="1200" y2="320" stroke="#00d4ff" stroke-width="1"/>
  </g>
  
  <!-- Main Title -->
  <text x="600" y="120" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="4">
    LAB DOCTOR M
  </text>
  
  <text x="600" y="170" font-family="Arial, sans-serif" font-size="24" fill="#00d4ff" text-anchor="middle">
    Клинико-диагностическая лаборатория | Автоматизация будущего
  </text>
  
  <!-- Metrics -->
  <g transform="translate(200, 240)">
    <rect x="0" y="0" width="200" height="80" rx="10" fill="rgba(0,212,255,0.1)" stroke="#00d4ff" stroke-width="2"/>
    <text x="100" y="30" font-family="Arial" font-size="36" font-weight="bold" fill="#00ff88" text-anchor="middle">7</text>
    <text x="100" y="55" font-family="Arial" font-size="14" fill="white" text-anchor="middle">Telegram Ботов</text>
  </g>
  
  <g transform="translate(500, 240)">
    <rect x="0" y="0" width="200" height="80" rx="10" fill="rgba(0,212,255,0.1)" stroke="#00d4ff" stroke-width="2"/>
    <text x="100" y="30" font-family="Arial" font-size="36" font-weight="bold" fill="#00ff88" text-anchor="middle">60K</text>
    <text x="100" y="55" font-family="Arial" font-size="14" fill="white" text-anchor="middle">VPN Клиентов</text>
  </g>
  
  <g transform="translate(800, 240)">
    <rect x="0" y="0" width="200" height="80" rx="10" fill="rgba(0,212,255,0.1)" stroke="#00d4ff" stroke-width="2"/>
    <text x="100" y="30" font-family="Arial" font-size="36" font-weight="bold" fill="#00ff88" text-anchor="middle">3</text>
    <text x="100" y="55" font-family="Arial" font-size="14" fill="white" text-anchor="middle">Дата Центра</text>
  </g>
  
  <!-- Accent line -->
  <line x1="0" y1="380" x2="1200" y2="380" stroke="url(#grad2)" stroke-width="4"/>
</svg>