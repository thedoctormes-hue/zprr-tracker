name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - '.github/workflows/deploy.yml'
      - 'landing/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: https://thedoctormes-hue.github.io/shtab-ai-gb52/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './landing'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  status-badge:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Update site status badge
        run: echo "Site deployed successfully"