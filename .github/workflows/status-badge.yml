name: Status Badge

on:
  push:
    branches: [main]
  schedule:
    - cron: '*/30 * * * *'

jobs:
  generate-badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Generate status badge
        run: |
          echo "![Site Status](https://img.shields.io/website?label=labdoctorm&url=https%3A%2F%2Fshtab-ai.ru)" >> $GITHUB_STEP_SUMMARY

