version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m bot.main
    env_file:
      - .env
    depends_on:
      - backend
    restart: unless-stopped
