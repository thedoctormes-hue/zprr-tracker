<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zakupki Drop Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        .container { max-width: 480px; margin: 0 auto; padding: 16px; }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 24px;
        }
        .header h1 { font-size: 24px; margin-bottom: 8px; }
        .header p { opacity: 0.9; font-size: 14px; }

        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:disabled { opacity: 0.6; }

        .result-item {
            padding: 12px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 8px;
        }
        .profit { color: #22c55e; font-weight: bold; }
        .source { font-size: 12px; color: #666; }
        .loader { text-align: center; padding: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 Zakupki Drop Bot</h1>
            <p>Анализ госзакупок для дропшипинга</p>
        </div>

        <div class="card">
            <div class="form-group">
                <label>Товар/Услуга</label>
                <input type="text" id="subject" placeholder="Медицинские маски 3 слоя" value="Медицинские маски 3 слоя">
            </div>

            <div class="form-group">
                <label>Гос цена (₽)</label>
                <input type="number" id="price" placeholder="150000" value="150000">
            </div>

            <div class="form-group">
                <label>Регион</label>
                <select id="region">
                    <option value="">Все регионы</option>
                    <option value="77" selected>Москва</option>
                    <option value="78">Санкт-Петербург</option>
                    <option value="02">Алматы</option>
                </select>
            </div>

            <button class="btn" onclick="analyze()">🔍 Проанализировать</button>
        </div>

        <div id="result" class="card" style="display:none;">
            <h3 style="margin-bottom: 12px;">📊 Результат</h3>
            <div id="result-content"></div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        async function analyze() {
            const subject = document.getElementById('subject').value;
            const price = parseFloat(document.getElementById('price').value);
            const region = document.getElementById('region').value;

            if (!subject || !price) {
                alert('Заполните все поля');
                return;
            }

            const resultEl = document.getElementById('result');
            const resultContent = document.getElementById('result-content');

            resultEl.style.display = 'block';
            resultContent.innerHTML = '<div class="loader">🔄 Анализируем...</div>';

            try {
                const response = await fetch('/zakupki/api/analyze', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({subject, price, region})
                });

                const data = await response.json();

                let html = `
                    <div style="margin-bottom: 12px;">
                        <strong>${data.subject}</strong><br>
                        <span>Гос цена: ${data.gov_price.toLocaleString()} ₽</span>
                    </div>
                `;

                data.matches.forEach(m => {
                    html += `
                        <div class="result-item">
                            <div class="source">${m.source}</div>
                            <div>Рыночная цена: ${m.market_price.toLocaleString()} ₽</div>
                            <div class="profit">Выгода: ${m.profit_potential.toFixed(1)}%</div>
                        </div>
                    `;
                });

                html += `<div style="margin-top: 12px; font-weight: bold;">${data.recommendation}</div>`;
                resultContent.innerHTML = html;

            } catch (e) {
                resultContent.innerHTML = `<div style="color: red;">Ошибка: ${e.message}</div>`;
            }
        }
    </script>
</body>
</html>
