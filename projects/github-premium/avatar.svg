<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Black background -->
  <rect width="128" height="128" fill="#000000"/>
  
  <!-- Microscope/Syringe silhouette - minimalist Apple style -->
  <g stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round">
    <!-- Main tube -->
    <line x1="64" y1="110" x2="64" y2="30"/>
    <!-- Eyepiece -->
    <circle cx="64" cy="20" r="8"/>
    <!-- Stage -->
    <line x1="40" y1="110" x2="88" y2="110"/>
    <!-- Arm -->
    <line x1="88" y1="110" x2="100" y2="100"/>
    <!-- Focus knob -->
    <circle cx="40" cy="110" r="6"/>
    <!-- Syringe needle (integrated) -->
    <line x1="64" y1="28" x2="64" y2="15"/>
    <polygon points="60,15 68,15 66,8 62,8" fill="#FFFFFF"/>
  </g>
</svg>