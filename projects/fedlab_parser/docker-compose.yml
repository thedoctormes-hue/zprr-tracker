version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:v1.7.0
    container_name: fedlab-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped
    environment:
      - QDRANT__LOG_LEVEL=INFO

volumes:
  qdrant_storage: